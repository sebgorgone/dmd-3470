<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASS Showcase</title>
    <link rel='stylesheet' href='main.css'>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  </head>
  <body>

    <!-- home page start -->

    <header class='hero' id='page0'>
      <img 
        src='media/sass-pink.svg' 
        id='sass-logo' 
        alt='sass-logo' 

        data-aos='zoom-in' 
        data-aos-duration='500'
        data-aos-easing='ease-in-sine'
      >
      <h1 
        class='title'
        data-aos='zoom-in'
        data-aos-easing='ease-in-sine'
        data-aos-delay='450'
        data-aos-duration='500'
      >
        SHOWCASE 
      </h1>
    </header>


    <section
      class='body'

      data-aos='zoom-in'
      data-aos-easing='ease-in-sine'
      data-aos-delay='450'
      data-aos-duration='500'
    >

      <div class='codeBlock'>

        <div class="navBarDiv">
          <div class="navButtonsDiv">

            <div class="redButtonDiv">

            </div>
            <div class="yellowButtonDiv">

            </div>
            <div class="greenButtonDiv">

            </div>

          </div>
          <p class='fileExt'>.scss</p>
        </div>

        <div class="codeBlockBody">


          <p>

            <span class='selector'>.Syntactically </span>
            <span class='bracket'>{</span>

          </p>

          <p class='tab1'>

            <span class='property'>width: </span>
            <span class='variable'>$awesome</span>;

          </p>
          <p class='tab1'>

            <span class='property'>height: </span>
            <span class='variable'>$style</span>;

          </p>

          <p class='tab1'>

            <span class='property'>color: </span>
            <span class='variable'>$sheets</span>;

          </p>

          <p>
            <span class='bracket'>}</span>
          </p>

        </div>

      </div>


    </section>

    <!-- home page end -->


    <!-- intro page start -->

    <!-- intro page end -->


    <!-- structure page end -->
    <!-- structure page end -->


    <!-- variable page start -->
    <!-- variable page end -->


    <header 
      style='height: 100vh'
      class='hero' >
      <img 
        src='media/sass-pink.svg' 
        id='sass-logo' 
        alt='sass-logo' 

        data-aos='zoom-in' 
        data-aos-duration='500'
        data-aos-easing='ease-in-sine'
      >
      <h1 
        class='title'
        data-aos='zoom-in'
        data-aos-easing='ease-in-sine'
        data-aos-delay='450'
        data-aos-duration='500'
      >
        SHOWCASE 
      </h1>

      <h2
        class='subHeader'
      >
        thank you
      </h2>
    </header>

    <script src='script.js'></script>
    <script>
    AOS.init();
    </script>
  </body>
</html>
